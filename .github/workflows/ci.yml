name: Smart Parking API CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      #note that the 3 next commands (clean compile, test and package) can be replaced by ./mvnw clean verify
      - name: Compile
        run: ./mvnw clean compile

      - name: Run Unit Tests
        run: ./mvnw test

      - name: Package application
        run: ./mvnw package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-parking-api
          path: target/*.jar

      # -----------------------------
      # Docker
      # -----------------------------

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/smart-parking-api:latest
            ${{ secrets.DOCKER_USERNAME }}/smart-parking-api:${{ github.sha }}